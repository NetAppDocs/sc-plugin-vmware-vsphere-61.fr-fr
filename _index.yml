indexpage:
  title: Documentation du SnapCenter Plug-in for VMware vSphere
  summary: SnapCenter Plug-in for VMware vSphere (SCV) est une appliance virtuelle
    basée sur Linux. En tant que solution autonome, il fournit des opérations de sauvegarde
    et de restauration rapides, peu encombrantes, cohérentes en cas de panne et compatibles
    avec les machines virtuelles pour les machines virtuelles, les banques de données
    et les VMDK. Il fonctionne également avec SnapCenter Server pour prendre en charge
    les opérations de sauvegarde et de restauration basées sur les applications dans
    les environnements VMware pour les plug-ins spécifiques aux applications SnapCenter
    .
  keywords: SnapCenter Plug-in for VMware vSphere, SCV
  lead: SnapCenter Plug-in for VMware vSphere (SCV) est une appliance virtuelle basée
